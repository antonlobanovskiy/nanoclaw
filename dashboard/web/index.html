<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoClaw Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --cyan: #58a6ff;
    --dim: #8b949e;
    --font: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
    --radius: 6px;
    --header-h: 72px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  /* ─── Layout ─── */
  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 0;
  }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }

  .header-uptime {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    font-size: 12px;
  }

  .header-uptime .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    box-shadow: 0 0 6px var(--green);
  }

  .header-uptime .dot.down {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }

  .header-metrics {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-left: auto;
  }

  .metric {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--dim);
  }

  .metric-label { color: var(--dim); }

  .progress-bar {
    width: 60px;
    height: 8px;
    background: #21262d;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar .fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .fill-cpu { background: var(--cyan); }
  .fill-mem { background: var(--yellow); }
  .fill-disk { background: var(--green); }
  .fill-high { background: var(--red) !important; }

  .header-channels {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--dim);
  }

  .channel-badge {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .channel-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .channel-dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .channel-dot.off { background: var(--red); opacity: 0.7; }

  .container-count {
    font-size: 12px;
    color: var(--dim);
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .panel {
    background: var(--card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-body {
    padding: 12px 16px;
    overflow-y: auto;
    flex: 1;
  }

  /* ─── Agents Panel ─── */
  .agent-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }

  .agent-item:hover { background: #1c2128; }
  .agent-item.selected { border-color: var(--cyan); background: rgba(88, 166, 255, 0.06); }

  .agent-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .agent-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .agent-dot.idle { background: var(--border); }

  .agent-info { flex: 1; min-width: 0; }

  .agent-name {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
  }

  .agent-status {
    font-size: 11px;
    color: var(--dim);
  }

  .agent-detail {
    font-size: 11px;
    color: var(--dim);
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agent-channel {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--dim);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ─── Tasks Panel ─── */
  .task-item {
    padding: 10px 0;
    border-bottom: 1px solid #21262d;
  }

  .task-item:last-child { border-bottom: none; }

  .task-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .task-icon { font-size: 12px; }
  .task-icon.ok { color: var(--green); }
  .task-icon.fail { color: var(--red); }
  .task-icon.pending { color: var(--dim); }

  .task-name {
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-schedule {
    font-size: 11px;
    color: var(--dim);
    flex-shrink: 0;
  }

  .task-meta {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--dim);
    padding-left: 20px;
  }

  .task-meta .ok { color: var(--green); }
  .task-meta .fail { color: var(--red); }

  /* ─── Transcript Panel ─── */
  .transcript-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dim);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }

  .transcript-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tx-event { padding: 4px 0; }

  .tx-label {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .tx-label.user { color: var(--cyan); }
  .tx-label.assistant { color: var(--green); }
  .tx-label.tool-use { color: var(--yellow); }
  .tx-label.tool-result { color: var(--dim); }
  .tx-label.subagent { color: #d2a8ff; }
  .tx-label.subagent-result { color: #d2a8ff; opacity: 0.7; }

  .tx-input-bar {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .tx-input-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
  }
  .tx-input-bar input:focus { border-color: var(--cyan); }
  .tx-input-bar button {
    background: var(--cyan);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .tx-input-bar button:hover { opacity: 0.85; }
  .tx-input-bar button:disabled { opacity: 0.4; cursor: not-allowed; }

  .tx-content {
    font-size: 12px;
    color: var(--text);
    padding-left: 16px;
    white-space: pre-wrap;
    word-break: break-word;
    opacity: 0.85;
  }

  .tx-content.result {
    color: var(--dim);
    opacity: 0.65;
    max-height: 150px;
    overflow: hidden;
    position: relative;
  }

  .tx-content.result.truncated::after {
    content: '...';
    display: block;
    color: var(--dim);
    font-style: italic;
  }

  /* ─── Analytics Panel ─── */
  .analytics-big {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }

  .analytics-label {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .chart-container {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 16px;
  }

  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 60px;
    margin-bottom: 6px;
  }

  .bar {
    flex: 1;
    background: var(--cyan);
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    transition: height 0.3s ease;
    opacity: 0.75;
    position: relative;
  }

  .bar:hover { opacity: 1; }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--dim);
  }

  .channel-stats {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .channel-stat {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }

  .channel-stat-name { color: var(--dim); }
  .channel-stat-count { color: var(--text); font-weight: 600; }

  .stat-row {
    display: flex;
    gap: 24px;
    margin-top: 8px;
  }

  .stat-box {
    flex: 1;
  }

  .stat-box .val {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .stat-box .lbl {
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ─── Empty State ─── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--dim);
    font-size: 12px;
    text-align: center;
  }

  /* ─── WS Status ─── */
  .ws-indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-left: 4px;
  }

  .ws-indicator.connected { background: var(--green); }
  .ws-indicator.disconnected { background: var(--red); }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
    }

    .header-metrics { margin-left: 0; }
    .header-row { gap: 10px; }

    .panel-body { max-height: 40vh; }

    html, body { overflow: auto; }
    .app { height: auto; min-height: 100vh; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ─── Header ─── -->
  <div class="header">
    <div class="header-row">
      <span class="header-title">NanoClaw</span>
      <span class="header-uptime">
        <span class="dot" id="hdr-dot"></span>
        <span id="hdr-uptime">connecting...</span>
      </span>
      <div class="header-metrics">
        <div class="metric">
          <span class="metric-label">CPU</span>
          <div class="progress-bar"><div class="fill fill-cpu" id="bar-cpu" style="width:0%"></div></div>
          <span id="val-cpu">--%</span>
        </div>
        <div class="metric">
          <span class="metric-label">MEM</span>
          <div class="progress-bar"><div class="fill fill-mem" id="bar-mem" style="width:0%"></div></div>
          <span id="val-mem">--%</span>
        </div>
        <div class="metric">
          <span class="metric-label">Disk</span>
          <div class="progress-bar"><div class="fill fill-disk" id="bar-disk" style="width:0%"></div></div>
          <span id="val-disk">--%</span>
        </div>
      </div>
    </div>
    <div class="header-row">
      <div class="header-channels">
        <span style="color:var(--dim)">Channels:</span>
        <span id="hdr-channels">--</span>
      </div>
      <span class="container-count" id="hdr-containers">Containers --/--</span>
      <span style="margin-left:auto;font-size:11px;color:var(--dim)">
        ws <span class="ws-indicator disconnected" id="ws-dot"></span>
      </span>
    </div>
  </div>

  <!-- ─── Grid ─── -->
  <div class="grid">
    <!-- Agents -->
    <div class="panel">
      <div class="panel-header">Agents</div>
      <div class="panel-body" id="agents-list">
        <div class="empty-state">No agents registered</div>
      </div>
    </div>

    <!-- Scheduled Tasks -->
    <div class="panel">
      <div class="panel-header">Scheduled Tasks</div>
      <div class="panel-body" id="tasks-list">
        <div class="empty-state">No scheduled tasks</div>
      </div>
    </div>

    <!-- Transcript -->
    <div class="panel">
      <div class="panel-header">
        <span>Transcript <span id="tx-group" style="color:var(--cyan)"></span></span>
      </div>
      <div class="panel-body" id="transcript-body">
        <div class="transcript-empty">Select an agent to view transcript</div>
      </div>
      <div class="tx-input-bar" id="tx-input-bar" style="display:none">
        <input type="text" id="tx-input" placeholder="Send message to agent..." autocomplete="off" />
        <button id="tx-send">Send</button>
      </div>
    </div>

    <!-- Analytics -->
    <div class="panel">
      <div class="panel-header">Analytics</div>
      <div class="panel-body" id="analytics-body">
        <div class="empty-state">No messages yet</div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ─── State ───
  const state = {
    selectedGroup: null,
    groups: [],
    tasks: [],
    taskHistory: [],
    transcriptEvents: [],
    containers: [],
    status: null,
    messageStats: null,
    ws: null,
    wsReconnectTimer: null,
  };

  // ─── Helpers ───
  const $ = id => document.getElementById(id);

  const formatDuration = ms => {
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m${s % 60 ? (s % 60) + 's' : ''}`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h${m % 60 ? (m % 60) + 'm' : ''}`;
    const d = Math.floor(h / 24);
    return `${d}d ${h % 24}h`;
  };

  const formatUptime = secs => {
    const d = Math.floor(secs / 86400);
    const h = Math.floor((secs % 86400) / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const parts = [];
    if (d) parts.push(`${d}d`);
    if (h) parts.push(`${h}h`);
    parts.push(`${m}m`);
    return parts.join(' ');
  };

  const relativeTime = ts => {
    if (!ts) return '--';
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 0) {
      const absDiff = Math.abs(diff);
      if (absDiff < 60) return `in ${Math.floor(absDiff)}s`;
      if (absDiff < 3600) return `in ${Math.floor(absDiff / 60)}m`;
      if (absDiff < 86400) return `in ${Math.floor(absDiff / 3600)}h`;
      return `in ${Math.floor(absDiff / 86400)}d`;
    }
    if (diff < 60) return `${Math.floor(diff)}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  };

  const escHtml = s => {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  };

  const truncate = (s, max) => s && s.length > max ? s.slice(0, max) + '...' : (s || '');

  // ─── API ───
  const BASE = `${location.protocol}//${location.host}`;

  const api = async path => {
    try {
      const r = await fetch(`${BASE}${path}`);
      if (!r.ok) throw new Error(r.statusText);
      return await r.json();
    } catch (e) {
      console.warn(`API ${path} failed:`, e);
      return null;
    }
  };

  // ─── Header ───
  const renderHeader = data => {
    if (!data) return;
    state.status = data;

    $('hdr-dot').className = 'dot';
    $('hdr-uptime').textContent = `up ${formatUptime(Math.floor((data.uptime || 0) / 1000))}`;

    const cpuPct = Math.round(data.cpu || 0);
    $('bar-cpu').style.width = `${cpuPct}%`;
    $('bar-cpu').className = `fill ${cpuPct > 80 ? 'fill-high' : 'fill-cpu'}`;
    $('val-cpu').textContent = `${cpuPct}%`;

    const memPct = data.totalMem ? Math.round(((data.totalMem - data.freeMem) / data.totalMem) * 100) : (data.mem || 0);
    $('bar-mem').style.width = `${memPct}%`;
    $('bar-mem').className = `fill ${memPct > 85 ? 'fill-high' : 'fill-mem'}`;
    $('val-mem').textContent = `${memPct}%`;

    const diskPct = data.disk ? Math.round(data.disk.percent || 0) : 0;
    $('bar-disk').style.width = `${diskPct}%`;
    $('bar-disk').className = `fill ${diskPct > 85 ? 'fill-high' : 'fill-disk'}`;
    $('val-disk').textContent = `${diskPct}%`;

    // Channels
    if (data.channels && data.channels.length) {
      $('hdr-channels').innerHTML = data.channels.map(ch =>
        `<span class="channel-badge"><span class="channel-dot ${ch.connected ? 'on' : 'off'}"></span>${escHtml(ch.name)}</span>`
      ).join(' ');
    } else {
      $('hdr-channels').textContent = 'none';
    }

    // Containers
    const c = data.containers || {};
    $('hdr-containers').textContent = `Containers ${c.active || 0}/${c.max || '--'}`;
  };

  // ─── Agents ───
  const renderAgents = groups => {
    if (!groups) return;
    state.groups = groups;
    const el = $('agents-list');

    if (!groups.length) {
      el.innerHTML = '<div class="empty-state">No agents registered</div>';
      return;
    }

    el.innerHTML = groups.map(g => {
      const now = Date.now();
      const lastAct = g.lastActivity ? new Date(g.lastActivity).getTime() : 0;
      const sel = state.selectedGroup === g.folder;

      // Check if a container is running for this group
      const container = (state.containers || []).find(c => c.name && c.name.startsWith(`nanoclaw-${g.folder}-`));
      const containerRunning = !!container;
      const isActive = containerRunning;

      // Container status line
      const containerStr = containerRunning
        ? `<span style="color:var(--green)">container running</span> (${escHtml(container.status)})`
        : '<span>container idle</span>';

      // Subagent info — only show when container is actually running
      const sub = g.subagents || { active: 0, total: 0 };
      const subagentStr = containerRunning && sub.active > 0
        ? ` <span style="color:#d2a8ff">${sub.active} subagent${sub.active > 1 ? 's' : ''}</span>`
        : '';

      // Last used line
      const lastUsedStr = lastAct
        ? `last used ${relativeTime(g.lastActivity)}`
        : 'never used';

      return `<div class="agent-item${sel ? ' selected' : ''}" data-folder="${escHtml(g.folder)}">
        <span class="agent-dot ${isActive ? 'active' : 'idle'}"></span>
        <div class="agent-info">
          <div class="agent-name">${escHtml(g.name || g.folder)}${g.isMain ? ' <span style="color:var(--dim);font-size:10px">(main)</span>' : ''}</div>
          <div class="agent-status">${containerStr}${subagentStr}</div>
          <div class="agent-status">${lastUsedStr}</div>
        </div>
        ${g.channel ? `<span class="agent-channel">${escHtml(g.channel)}</span>` : ''}
      </div>`;
    }).join('');

    el.querySelectorAll('.agent-item').forEach(item => {
      item.addEventListener('click', () => selectAgent(item.dataset.folder));
    });
  };

  const selectAgent = folder => {
    state.selectedGroup = folder;
    renderAgents(state.groups);
    loadTranscript(folder);

    // Show input bar
    const inputBar = $('tx-input-bar');
    inputBar.style.display = folder ? 'flex' : 'none';

    // Subscribe via WebSocket
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      state.ws.send(JSON.stringify({ type: 'subscribe', group: folder }));
    }
  };

  // ─── Dashboard Input ───
  const sendDashboardMessage = async () => {
    const input = $('tx-input');
    const btn = $('tx-send');
    const text = input.value.trim();
    if (!text || !state.selectedGroup) return;

    btn.disabled = true;
    input.value = '';
    try {
      await fetch(`${BASE}/api/groups/${encodeURIComponent(state.selectedGroup)}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    } catch (e) {
      console.warn('Send failed:', e);
    }
    btn.disabled = false;
    input.focus();
  };

  $('tx-send').addEventListener('click', sendDashboardMessage);
  $('tx-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendDashboardMessage();
  });

  // ─── Scheduled Tasks ───
  const renderTasks = (tasks, history) => {
    if (tasks) state.tasks = tasks;
    if (history) state.taskHistory = history;
    const el = $('tasks-list');
    const activeTasks = (state.tasks || []).filter(t => t.status === 'active');

    if (!activeTasks.length) {
      el.innerHTML = '<div class="empty-state">No scheduled tasks</div>';
      return;
    }

    const historyByTask = {};
    (state.taskHistory || []).forEach(h => {
      if (!historyByTask[h.task_id]) historyByTask[h.task_id] = [];
      historyByTask[h.task_id].push(h);
    });

    // Group tasks by group_folder
    const tasksByGroup = {};
    activeTasks.forEach(t => {
      const folder = t.group_folder || 'unknown';
      if (!tasksByGroup[folder]) tasksByGroup[folder] = [];
      tasksByGroup[folder].push(t);
    });

    const formatTime = iso => {
      if (!iso) return '--';
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    el.innerHTML = Object.entries(tasksByGroup).map(([folder, tasks]) => {
      const groupLabel = (state.groups || []).find(g => g.folder === folder)?.name || folder;
      const taskHtml = tasks.map(t => {
        const lastHist = historyByTask[t.id]?.[0];
        const lastOk = lastHist?.status === 'success' || (t.last_run && !lastHist);
        const lastFail = lastHist?.status === 'error';
        const iconClass = lastFail ? 'fail' : (lastOk ? 'ok' : 'pending');
        const iconChar = lastFail ? '\u2717' : (lastOk ? '\u2713' : '\u25cb');

        const lastDur = lastHist?.duration_ms ? formatDuration(lastHist.duration_ms) : '--';
        const lastStatus = lastFail ? 'failed' : (lastOk ? lastDur : '--');

        const prompt = t.prompt || t.id || 'task';
        const shortPrompt = truncate(prompt, 30);
        const schedVal = t.schedule_value || '';
        const nextTime = t.next_run ? `${formatTime(t.next_run)} (${relativeTime(t.next_run)})` : '--';
        const lastTime = t.last_run ? formatTime(t.last_run) : '--';

        return `<div class="task-item">
          <div class="task-header">
            <span class="task-icon ${iconClass}">${iconChar}</span>
            <span class="task-name" title="${escHtml(prompt)}">${escHtml(shortPrompt)}</span>
            <span class="task-schedule">${escHtml(schedVal)}</span>
          </div>
          <div class="task-meta">
            <span>Last: <span class="${iconClass}">${lastFail ? '\u2717 ' : '\u2713 '}${escHtml(lastStatus)}</span> ${escHtml(lastTime)}</span>
            <span>Next: ${escHtml(nextTime)}</span>
          </div>
        </div>`;
      }).join('');

      return `<div class="task-group-header" style="font-size:11px;color:var(--cyan);text-transform:uppercase;margin:8px 0 4px;padding-bottom:2px;border-bottom:1px solid var(--border)">${escHtml(groupLabel)}</div>${taskHtml}`;
    }).join('');
  };

  // ─── Transcript ───
  const renderTranscriptEvents = events => {
    const el = $('transcript-body');
    if (!events || !events.length) {
      el.innerHTML = '<div class="transcript-empty">No messages in this conversation</div>';
      return;
    }

    const html = events.map(ev => {
      if (ev.type === 'user') {
        // Check for subagent (Task) result first
        const taskResult = ev.toolUseResult;
        if (taskResult && (taskResult.status || taskResult.task)) {
          const task = taskResult.task || taskResult;
          const status = task.status || taskResult.status || 'unknown';
          const desc = task.description || (taskResult.prompt || '').slice(0, 80) || '';
          const output = task.output ? truncate(task.output, 200) : '';
          return `<div class="tx-event">
            <div class="tx-label subagent-result">[subagent ${escHtml(status)}] ${escHtml(truncate(desc, 60))}</div>
            ${output ? `<div class="tx-content result">${escHtml(output)}</div>` : ''}
          </div>`;
        }
        const text = extractText(ev.message?.content || ev.content || '');
        return `<div class="tx-event">
          <div class="tx-label user">[user]</div>
          <div class="tx-content">${escHtml(text)}</div>
        </div>`;
      }

      if (ev.type === 'assistant') {
        const blocks = ev.message?.content || ev.content || [];
        if (typeof blocks === 'string') {
          return `<div class="tx-event">
            <div class="tx-label assistant">[assistant]</div>
            <div class="tx-content">${escHtml(blocks)}</div>
          </div>`;
        }
        return (Array.isArray(blocks) ? blocks : []).map(b => {
          if (b.type === 'text') {
            return `<div class="tx-event">
              <div class="tx-label assistant">[assistant]</div>
              <div class="tx-content">${escHtml(b.text || '')}</div>
            </div>`;
          }
          if (b.type === 'tool_use') {
            const isSubagent = b.name === 'Task';
            if (isSubagent) {
              const desc = b.input?.description || b.input?.prompt?.slice(0, 100) || '';
              return `<div class="tx-event">
                <div class="tx-label subagent">[subagent spawn] ${escHtml(desc)}</div>
                <div class="tx-content">${escHtml(truncate(b.input?.prompt || '', 200))}</div>
              </div>`;
            }
            const inputStr = b.input ? Object.entries(b.input).map(([k, v]) =>
              `${k}: ${typeof v === 'string' ? truncate(v, 80) : JSON.stringify(v).slice(0, 80)}`
            ).join('\n') : '';
            return `<div class="tx-event">
              <div class="tx-label tool-use">[tool_use] ${escHtml(b.name || '')}</div>
              <div class="tx-content">${escHtml(inputStr)}</div>
            </div>`;
          }
          return '';
        }).join('');
      }

      if (ev.type === 'tool') {
        const content = ev.content || ev.message?.content || [];
        let text = '';
        if (Array.isArray(content)) {
          content.forEach(c => {
            if (c.content && Array.isArray(c.content)) {
              c.content.forEach(inner => {
                if (inner.type === 'text') text += (inner.text || '') + '\n';
              });
            } else if (c.type === 'text') {
              text += (c.text || '') + '\n';
            }
          });
        } else if (typeof content === 'string') {
          text = content;
        }

        const lines = text.trim().split('\n');
        const truncated = lines.length > 10;
        const display = truncated ? lines.slice(0, 10).join('\n') : text.trim();

        return `<div class="tx-event">
          <div class="tx-label tool-result">[tool_result]</div>
          <div class="tx-content result${truncated ? ' truncated' : ''}">${escHtml(display)}</div>
        </div>`;
      }

      return '';
    }).join('');

    el.innerHTML = `<div class="transcript-events">${html}</div>`;
    el.scrollTop = el.scrollHeight;
  };

  const extractText = content => {
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
      return content
        .filter(b => b.type === 'text')
        .map(b => b.text || '')
        .join('\n');
    }
    return String(content);
  };

  const loadTranscript = async folder => {
    $('tx-group').textContent = `[${folder}]`;
    $('transcript-body').innerHTML = '<div class="transcript-empty">Loading...</div>';
    state.transcriptEvents = [];
    const data = await api(`/api/transcript/${encodeURIComponent(folder)}`);
    if (data) {
      state.transcriptEvents = Array.isArray(data) ? data : [];
      renderTranscriptEvents(state.transcriptEvents);
    } else {
      $('transcript-body').innerHTML = '<div class="transcript-empty">Failed to load transcript</div>';
    }
  };

  // ─── Analytics ───
  const renderAnalytics = data => {
    if (!data) return;
    state.messageStats = data;
    const el = $('analytics-body');

    const today = data.today || 0;
    const hourly = data.hourly || [];
    const byChannel = data.byChannel || [];

    const maxCount = Math.max(...hourly.map(h => h.count), 1);

    const bars = hourly.map(h => {
      const pct = (h.count / maxCount) * 100;
      const hour = new Date(h.hour).getHours();
      const label = hour === 0 ? '12am' : hour < 12 ? `${hour}am` : hour === 12 ? '12pm' : `${hour - 12}pm`;
      return `<div class="bar" style="height:${Math.max(pct, 3)}%" title="${label} - ${h.count} msgs"></div>`;
    }).join('');

    const labelStart = '12am';
    const labelMid = '12pm';
    const labelEnd = '11pm';

    const channelHtml = byChannel.length
      ? byChannel.map(c =>
          `<div class="channel-stat">
            <span class="channel-stat-name">${escHtml(c.channel)}</span>
            <span class="channel-stat-count">${c.count}</span>
          </div>`
        ).join('')
      : '<div style="font-size:11px;color:var(--dim)">No channel data</div>';

    el.innerHTML = `
      <div class="analytics-big">${today}</div>
      <div class="analytics-label">Messages today</div>
      <div class="chart-container">
        <div class="bar-chart">${bars}</div>
        <div class="bar-labels">
          <span>${labelStart}</span>
          <span>${labelMid}</span>
          <span>${labelEnd}</span>
        </div>
      </div>
      <div class="analytics-label">By channel</div>
      <div class="channel-stats">${channelHtml}</div>
      <div class="stat-row" id="container-stats"></div>
    `;

    loadContainerStats();
  };

  const loadContainerStats = async () => {
    const containers = await api('/api/containers');
    const el = document.getElementById('container-stats');
    if (!el) return;

    const total = containers ? containers.length : 0;
    const active = total; // docker ps only shows running containers

    // Aggregate subagent counts — only for groups with running containers
    const groups = state.groups || [];
    const cList = containers || [];
    const totalSubagents = groups.reduce((sum, g) => {
      const hasContainer = cList.some(c => c.name && c.name.startsWith(`nanoclaw-${g.folder}-`));
      return sum + (hasContainer ? (g.subagents?.active || 0) : 0);
    }, 0);

    el.innerHTML = `
      <div class="stat-box">
        <div class="val">${active}</div>
        <div class="lbl">Active containers</div>
      </div>
      <div class="stat-box">
        <div class="val">${totalSubagents}</div>
        <div class="lbl">Active subagents</div>
      </div>
    `;
  };

  // ─── WebSocket ───
  const connectWs = () => {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const url = `${proto}//${location.host}/ws`;

    try {
      state.ws = new WebSocket(url);
    } catch (e) {
      console.warn('WebSocket connect failed:', e);
      scheduleReconnect();
      return;
    }

    state.ws.onopen = () => {
      $('ws-dot').className = 'ws-indicator connected';
      // Re-subscribe if we had a selected group
      if (state.selectedGroup) {
        state.ws.send(JSON.stringify({ type: 'subscribe', group: state.selectedGroup }));
      }
    };

    state.ws.onclose = () => {
      $('ws-dot').className = 'ws-indicator disconnected';
      scheduleReconnect();
    };

    state.ws.onerror = () => {
      $('ws-dot').className = 'ws-indicator disconnected';
    };

    state.ws.onmessage = ev => {
      try {
        const msg = JSON.parse(ev.data);
        switch (msg.type) {
          case 'status':
            renderHeader(msg.data);
            // Refresh containers and re-render agents on each status tick
            api('/api/containers').then(c => {
              state.containers = c || [];
              if (state.groups) renderAgents(state.groups);
            });
            break;
          case 'groups':
            renderAgents(msg.data);
            break;
          case 'messages':
            renderAnalytics(msg.data);
            break;
          case 'tasks':
            renderTasks(msg.data?.tasks, msg.data?.history);
            break;
          case 'transcript':
            if (state.selectedGroup && Array.isArray(msg.data)) {
              state.transcriptEvents.push(...msg.data);
              if (state.transcriptEvents.length > 500) {
                state.transcriptEvents = state.transcriptEvents.slice(-500);
              }
              renderTranscriptEvents(state.transcriptEvents);
            }
            break;
        }
      } catch (e) {
        console.warn('WS message parse error:', e);
      }
    };
  };

  const scheduleReconnect = () => {
    if (state.wsReconnectTimer) clearTimeout(state.wsReconnectTimer);
    state.wsReconnectTimer = setTimeout(connectWs, 2000);
  };

  // ─── Init ───
  const init = async () => {
    // Fetch all data in parallel
    const [statusData, groupsData, tasksData, historyData, messagesData, containersData] = await Promise.all([
      api('/api/status'),
      api('/api/groups'),
      api('/api/tasks'),
      api('/api/tasks/history?limit=50'),
      api('/api/messages/stats'),
      api('/api/containers'),
    ]);

    state.containers = containersData || [];
    renderHeader(statusData);
    renderAgents(groupsData);
    renderTasks(tasksData, historyData);
    renderAnalytics(messagesData);

    // Start WebSocket
    connectWs();
  };

  init();
})();
</script>
</body>
</html>
